
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AH - Portfolio</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-deep: #FFFFFF;
        --bg-navy: #F5F5F5;
        --bg-card: #F0F0F0;
        --text-primary: #111111;
        --text-secondary: #6B7280;
        --accent: #FECC00;

        /* Typography System */
        --font-display: 'Poppins', sans-serif;
        --font-text: 'Poppins', sans-serif;
        --font-premium: 'Poppins', sans-serif;
        --font-montserrat: 'Montserrat', sans-serif;
      }

      body {
        font-family: var(--font-text);
        font-size: 17px;
        line-height: 1.6;
        font-weight: 400;
        letter-spacing: -0.01em;
        background-color: #FFFFFF;
        color: #111111;
        margin: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      h1, h2, h3, .font-display {
        font-family: var(--font-display);
        letter-spacing: -0.02em;
        font-weight: 600;
      }

      .font-serif {
        font-family: 'Poppins', sans-serif;
      }

      .font-montserrat {
        font-family: var(--font-montserrat);
      }

      /* Light Glassmorphism */
      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(254, 204, 0, 0.2);
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .glass-card:hover {
        border-color: rgba(254, 204, 0, 0.55);
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.08), 0 0 20px rgba(254, 204, 0, 0.08);
        transform: translateY(-5px) scale(1.008);
        z-index: 20;
      }

      /* Animated Glare Line */
      @keyframes glare-sweep {
        0% { transform: translateX(-150%) skewX(-45deg); opacity: 0; }
        20% { opacity: 0.5; }
        80% { opacity: 0.5; }
        100% { transform: translateX(150%) skewX(-45deg); opacity: 0; }
      }

      .glare-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 80px;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(254, 204, 0, 0.07), transparent);
        filter: blur(6px);
        animation: glare-sweep 4s infinite linear;
        pointer-events: none;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin 3s linear infinite;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #F5F5F5;
      }

      ::-webkit-scrollbar-thumb {
        background: #D1D5DB;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      @keyframes scroll-down {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(8px); opacity: 0; }
      }
      .animate-scroll {
        animation: scroll-down 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .text-display-1 { font-size: 80px; line-height: 1.1; font-weight: 700; }
      .text-display-2 { font-size: 56px; line-height: 1.1; font-weight: 600; }
      .text-headline { font-size: 32px; line-height: 1.2; font-weight: 600; }
      .text-body { font-size: 19px; line-height: 1.6; font-weight: 400; }
      
      @media (max-width: 768px) {
        .text-display-1 { font-size: 44px; }
        .text-display-2 { font-size: 36px; }
      }

      /* ── Single page-wide circle ── */
      @keyframes page-circle-breathe {
        0%, 100% { opacity: 0.13; transform: translate(-50%, -50%) scale(0.96); }
        50%       { opacity: 0.24; transform: translate(-50%, -50%) scale(1.04); }
      }

      /* ── Hero Background Animations ── */

      /* Aurora blob drift */
      @keyframes hero-blob-a {
        0%, 100% { transform: translate(0,    0)    scale(1);    }
        30%       { transform: translate(5%,   6%)   scale(1.07); }
        65%       { transform: translate(-3%,  3%)   scale(0.95); }
      }
      @keyframes hero-blob-b {
        0%, 100% { transform: translate(0,    0)    scale(1);    }
        40%       { transform: translate(-6%, -5%)  scale(1.10); }
        75%       { transform: translate(4%,  -2%)  scale(0.93); }
      }
      @keyframes hero-blob-c {
        0%, 100% { transform: translate(0,    0)    scale(1);    }
        50%       { transform: translate(5%,   5%)  scale(1.14); }
      }

      /* Concentric rings pulse outward */
      @keyframes hero-ring-pulse {
        0%   { opacity: 1;   transform: scale(0.80); }
        100% { opacity: 0;   transform: scale(1.40); }
      }
      /* Center dot breathe */
      @keyframes hero-dot-breathe {
        0%, 100% { opacity: 0.75; transform: scale(1);   }
        50%       { opacity: 1;   transform: scale(1.8); }
      }
      /* Dash-line flow */
      @keyframes hero-line-flow {
        to { stroke-dashoffset: -120; }
      }
      /* Dot grid opacity breathe */
      @keyframes hero-grid-breathe {
        0%, 100% { opacity: 0.80; }
        50%       { opacity: 1;    }
      }
      /* Floating tick marks */
      @keyframes hero-tick-float {
        0%, 100% { transform: translateY(0px);  opacity: 0.18; }
        50%       { transform: translateY(-14px); opacity: 0.32; }
      }

      /* Classes */
      .hero-blob-a { animation: hero-blob-a 20s ease-in-out infinite; will-change: transform; }
      .hero-blob-b { animation: hero-blob-b 25s ease-in-out infinite; will-change: transform; }
      .hero-blob-c { animation: hero-blob-c 17s ease-in-out infinite; will-change: transform; }

      .hero-ring-1 { animation: hero-ring-pulse 4.5s ease-out infinite; }
      .hero-ring-2 { animation: hero-ring-pulse 4.5s ease-out infinite; animation-delay: -1.5s; }
      .hero-ring-3 { animation: hero-ring-pulse 4.5s ease-out infinite; animation-delay: -3.0s; }
      .hero-center-dot { animation: hero-dot-breathe 2.5s ease-in-out infinite; }

      .hero-line-a {
        stroke-dasharray: 24 88;
        animation: hero-line-flow 5s linear infinite;
      }
      .hero-line-b {
        stroke-dasharray: 16 72;
        animation: hero-line-flow 8s linear infinite;
        animation-delay: -3s;
      }
      .hero-line-c {
        stroke-dasharray: 20 80;
        animation: hero-line-flow 6s linear infinite reverse;
        animation-delay: -1.5s;
      }

      .hero-grid-breathe { animation: hero-grid-breathe 6s ease-in-out infinite; }

      .hero-tick-a { animation: hero-tick-float 7s  ease-in-out infinite; }
      .hero-tick-b { animation: hero-tick-float 9s  ease-in-out infinite; animation-delay: -3s; }
      .hero-tick-c { animation: hero-tick-float 11s ease-in-out infinite; animation-delay: -6s; }

      /* ── Achievement Section Pattern Animations ── */
      @keyframes ach-float-a {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        40%       { transform: translateY(-18px) rotate(3deg); }
        70%       { transform: translateY(-8px) rotate(-2deg); }
      }
      @keyframes ach-float-b {
        0%, 100% { transform: translateY(0px) rotate(45deg); }
        50%       { transform: translateY(-22px) rotate(45deg); }
      }
      @keyframes ach-float-c {
        0%, 100% { transform: translateY(0px) scale(1); opacity: 0.15; }
        50%       { transform: translateY(-14px) scale(1.08); opacity: 0.28; }
      }
      @keyframes ach-grid-breathe {
        0%, 100% { opacity: 0.7; }
        50%       { opacity: 1; }
      }
      @keyframes ach-dash-flow {
        to { stroke-dashoffset: -80; }
      }
      @keyframes ach-underline-draw {
        from { stroke-dashoffset: 400; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes ach-line-drift {
        0%   { transform: translateX(-6%) rotate(-18deg); }
        100% { transform: translateX(6%) rotate(-18deg); }
      }
      @keyframes ach-corner-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      .ach-float-a  { animation: ach-float-a  9s  ease-in-out infinite; }
      .ach-float-b  { animation: ach-float-b  7s  ease-in-out infinite; }
      .ach-float-c  { animation: ach-float-c  11s ease-in-out infinite; }
      .ach-float-a2 { animation: ach-float-a  11s ease-in-out infinite; animation-delay: -4s; }
      .ach-float-b2 { animation: ach-float-b  8s  ease-in-out infinite; animation-delay: -3s; }

      .ach-grid-breathe { animation: ach-grid-breathe 5s ease-in-out infinite; }

      .ach-dash-flow {
        stroke-dasharray: 20 60;
        animation: ach-dash-flow 3s linear infinite;
      }
      .ach-dash-flow-slow {
        stroke-dasharray: 12 40;
        animation: ach-dash-flow 5s linear infinite;
        animation-delay: -1.5s;
      }

      .ach-underline {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: ach-underline-draw 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
      }

      .ach-corner-arc {
        transform-origin: center;
        animation: ach-corner-spin 18s linear infinite;
      }

      /* ── SVG dot grid — only radius (r) animates, positions never move ── */

      /* Phase A: small → large (1px → 2px) */
      @keyframes dot-phase-a {
        0%, 100% { r: 1px; }
        50%       { r: 2px; }
      }
      /* Phase B: large → small (2px → 1px) — opposite of A */
      @keyframes dot-phase-b {
        0%, 100% { r: 2px; }
        50%       { r: 1px; }
      }
      .dot-phase-a { animation: dot-phase-a 5s ease-in-out infinite; }
      .dot-phase-b { animation: dot-phase-b 5s ease-in-out infinite; }

      /* ── Soft blur shape floating ── */
      @keyframes blur-float-a {
        0%, 100% { transform: translate(0px,   0px)   scale(1);    }
        33%       { transform: translate(28px, -18px)  scale(1.05); }
        66%       { transform: translate(-12px, 14px)  scale(0.97); }
      }
      @keyframes blur-float-b {
        0%, 100% { transform: translate(0px,   0px)   scale(1);    }
        40%       { transform: translate(-22px, 18px)  scale(1.08); }
        75%       { transform: translate(18px, -12px)  scale(0.94); }
      }
      @keyframes blur-float-c {
        0%, 100% { transform: translate(0px,  0px)  scale(1);    }
        50%       { transform: translate(14px, 22px) scale(1.04); }
      }

      .blur-float-1 { animation: blur-float-a 22s ease-in-out infinite; will-change: transform; }
      .blur-float-2 { animation: blur-float-b 28s ease-in-out infinite; animation-delay: -9s;  will-change: transform; }
      .blur-float-3 { animation: blur-float-c 20s ease-in-out infinite; animation-delay: -6s;  will-change: transform; }
      .blur-float-4 { animation: blur-float-a 25s ease-in-out infinite; animation-delay: -13s; will-change: transform; }
      .blur-float-5 { animation: blur-float-b 32s ease-in-out infinite; animation-delay: -4s;  will-change: transform; }
      .blur-float-6 { animation: blur-float-c 18s ease-in-out infinite; animation-delay: -8s;  will-change: transform; }
    </style>
